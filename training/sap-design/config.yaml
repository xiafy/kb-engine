# Branch: sap-design
# SAP Statistical Analysis Plan Design

branch: sap-design
version: 2.0  # v5.0 architecture: independent program.md + evaluate.md + case-config.json
status: active

# Branch files (self-contained, no _shared/ dependency)
files:
  program: training/sap-design/program.md
  evaluate: training/sap-design/evaluate.md
  case_config: training/sap-design/case-config.json
  case_params: training/sap-design/case-params.json  # protocol parameters as fixed input
  framework: training/_shared/framework.md  # universal skeleton (read-only reference)

sop:
  core: core/sap-design.md
  depends_on: core/protocol-design.md  # SAP requires protocol design parameters as input
  domains_mapping: case-config.json
  indications_mapping: case-config.json

answer_extraction:
  chapters:
    - "Statistical Review — Analysis Plan"
    - "Statistical Review — Multiplicity"
    - "Statistical Review — Interim Analysis"
    - "Statistical Review — Sample Size"
    - "Statistical Review — Missing Data"
    - "Statistical Review — Subgroup Analysis"
    - "Clinical Review — Efficacy"

scoring:
  dimensions:
    - primary_analysis_method
    - multiplicity_control
    - interim_analysis
    - analysis_sets
    - missing_data
    - subgroup_analysis
    - sensitivity_analyses
    - sample_size_method
    - estimand_framework
  skip_items: null
  custom_rubric: null

# Owner Agent configuration
agents:
  owner_count: 2
  owner_timeout: 360  # longer than PD (300s) — exec calculations take time
  judge_count: 3

# Difference analysis types (SAP-specific)
difference_codes:
  - { code: METH,  label: "Statistical method wrong", sop_fixable: true }
  - { code: ASSUM, label: "Assumption unreasonable", sop_fixable: true }
  - { code: IMPL,  label: "Implementation detail missing", sop_fixable: true }
  - { code: ALT,   label: "Reasonable but non-FDA choice", sop_fixable: false }
  - { code: INFO,  label: "Protocol info insufficient", sop_fixable: false }

sop_write_targets:
  global: sop/core/sap-design.md
  domain: "sop/domains/{domain}.md ## SAP Design"
  indication: "sop/indications/{indication}.md ## SAP Design"
  regulatory: "sop/regulatory/{regulatory}.md"

# Convergence criteria
convergence:
  match_threshold: 0.65  # lower than PD (0.70) — SAP is harder
  consecutive_rounds: 3
  max_new_rules: 1
  divergence_rolling_window: 5

# Batch strategy (2 batches, not 4)
batch_strategy:
  - { batch: 1, rounds: "1-5",  mode: "intensive", review_after: true }
  - { batch: 2, rounds: "6-10", mode: "standard",  review_after: true }

# Execution order (by statistical complexity, not clinical domain)
execution_order:
  - 12-sotyktu
  - 15-orgovyx
  - 10-kimmtrak
  - 05-vyloy
  - 13-tavneos
  - 18-voranigo
  - 04-datroway
  - 08-truqap
  - 07-orserdu
  - 01-inluriyo
  - 19-lumakras
  - 02-hernexeos
  - 03-hyrnuo
  - 06-retevmo
  - 20-modeyso
  - 11-loqtorzi
  - 14-airsupra
  - 16-ogsiveo
  - 09-komzifti
  - 17-rytelo

history:
  total_rounds: 0
  open_book_rounds_completed: 0
  current_match: null
  sop_rules_current: 38  # seed SOP
  seed_sources:
    - "sop.md v2.2 Step 5 split (7 rules)"
    - "D2V SOP-BS-002 (SAP development process)"
    - "kb/methods/sop/statistical-design-sop.md (statistical method decisions)"
    - "KB migration 2026-03-30 (33 rules from Amanda/Walt)"
  creation_date: "2026-03-30"
  training_design_date: "2026-03-31"
